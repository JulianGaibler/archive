query settings {
  me {
    name
    username
    profilePicture {
      profilePicture256
      profilePicture64
    }
    linkedTelegram
    totpStatus {
      enabled
      recoveryCodesRemaining
    }
    passkeys {
      id
      name
      deviceType
      backedUp
      transports
      createdAt
    }
  }
  userSessions {
    createdAt
    firstIp
    id
    latestIp
    current
    userAgent
    updatedAt
  }
}
